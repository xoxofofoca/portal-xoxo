<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Emilli dos Santos</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .container { position: relative; z-index: 10; padding: 30px; width: 90%; max-width: 500px; text-align: center; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 50px rgba(255, 75, 43, 0.4); }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #ff4b2b; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255, 75, 43, 0.8); }
        #surpresa { display: none; animation: fadeIn 2s forwards; }
        .texto { font-size: 1.1rem; line-height: 1.8; margin-bottom: 20px; }
        .promessa { display: block; margin-top: 20px; color: #ff416c; font-weight: 600; font-size: 1.3rem; text-shadow: 0 0 15px rgba(255, 65, 108, 0.7); }
        #legenda { margin-top: 25px; font-style: italic; color: #ff9a9e; height: 40px; font-size: 1rem; }
        .botao { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; border: none; padding: 20px 40px; border-radius: 100px; font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #player-api { position: absolute; top: -1000px; }
    </style>
</head>
<body>
    <canvas id="galaxy"></canvas>
    <div class="container">
        <h1>Emilli dos Santos</h1>
        <button id="btnPlay" class="botao" onclick="abrirSurpresa()">Veja sua surpresa ❤️</button>
        <div id="surpresa">
            <div class="texto">
                <p>Eu sei que por um momento eu te deixei. O mundo ficou vazio, mas isso me fez entender que não existe sentido em nada se você não estiver aqui.</p>
                <span class="promessa">Eu nunca mais vou te deixar. Prometo.</span>
            </div>
            <div id="legenda">Preparando nossa música...</div>
        </div>
    </div>

    <div id="player-api"></div>

    <script>
        // --- ANIMAÇÃO DA GALÁXIA ---
        const canvas = document.getElementById('galaxy');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<500; i++) {
                stars.push({ x: 0, y: 0, r: Math.random() * 1.5, ang: Math.random() * Math.PI * 2, dist: Math.random() * (canvas.width / 1.5), v: 0.0005 + Math.random() * 0.001 });
            }
        }
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                s.ang += s.v;
                let x = canvas.width/2 + Math.cos(s.ang) * s.dist;
                let y = canvas.height/2 + Math.sin(s.ang) * s.dist;
                ctx.beginPath(); ctx.arc(x, y, s.r, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        window.onresize = init; init(); draw();

        // --- INTEGRAÇÃO YOUTUBE ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-api', {
                height: '0',
                width: '0',
                videoId: 'yJEA_c6GxVE', // Anna of the North - Lovers
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'start': 81 // Começa em 1:21
                }
            });
        }

        function abrirSurpresa() {
            // Tenta dar play no YouTube
            if (player && player.playVideo) {
                player.playVideo();
            }

            document.getElementById('btnPlay').style.display = 'none';
            document.getElementById('surpresa').style.display = 'block';
            
            const frases = [
                "Sentindo meu caminho de volta para você...",
                "Eu nunca quis te ver partir.",
                "Tudo o que eu vejo é você.",
                "Prometo que não vou mais te deixar."
            ];
            let i = 0;
            document.getElementById('legenda').innerText = frases[0];
            setInterval(() => {
                i = (i + 1) % frases.length;
                document.getElementById('legenda').innerText = frases[i];
            }, 4500);
        }
    </script>
</body>
</html>
