<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Saúde do Corpo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container py-5">
  <h1 class="text-success text-center">🏋️‍♀️ Saúde do Corpo</h1>

  <!-- CADASTRO -->
  <div id="cadastroCard" class="card p-4 mb-4">
    <h4>📝 Cadastro</h4>
    <form id="cadastroForm">
      <input type="text" id="novoUsuario" class="form-control mb-2" placeholder="Novo usuário" required>
      <input type="password" id="novaSenha" class="form-control mb-2" placeholder="Senha" required>
      <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
    </form>
  </div>

  <!-- LOGIN -->
  <div id="loginCard" class="card p-4 mb-4">
    <h4>🔑 Login</h4>
    <form id="loginForm">
      <input type="text" id="usuario" class="form-control mb-2" placeholder="Usuário" required>
      <input type="password" id="senha" class="form-control mb-2" placeholder="Senha" required>
      <button type="submit" class="btn btn-success w-100">Entrar</button>
    </form>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="d-none">
    <h2>Bem-vindo, <span id="userName"></span>!</h2>

    <!-- FORM DADOS -->
    <form id="dadosForm" class="card p-4 mb-4">
      <input type="number" id="idade" class="form-control mb-2" placeholder="Idade" required>
      <input type="number" id="peso" class="form-control mb-2" placeholder="Peso (kg)" required>
      <input type="number" id="altura" class="form-control mb-2" placeholder="Altura (m)" required>
      <button type="submit" class="btn btn-success w-100">Calcular IMC</button>
    </form>

    <!-- RESULTADO -->
    <div id="resultado" class="card p-4 mb-4 d-none"></div>

    <!-- MODALIDADE -->
    <div id="modalidadeCard" class="card p-4 mb-4 d-none">
      <h4>Escolha sua modalidade</h4>
      <select id="modalidade" class="form-select mb-3">
        <option value="corredor">Corredor</option>
        <option value="futebol">Jogador de Futebol</option>
        <option value="lutador">Lutador</option>
        <option value="fisiculturista">Fisiculturista</option>
        <option value="bombeiro">Bombeiro</option>
        <option value="policial">Policial</option>
      </select>
      <button id="diagnosticoBtn" class="btn btn-primary w-100">Gerar Diagnóstico</button>
    </div>

    <!-- DIAGNÓSTICO -->
    <div id="diagnostico" class="card p-4 mb-4 d-none"></div>

    <!-- HISTÓRICO -->
    <div id="historico" class="card p-4 mb-4 d-none">
      <h4>📜 Histórico de Diagnósticos</h4>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Data</th>
            <th>Peso</th>
            <th>IMC</th>
            <th>Modalidade</th>
          </tr>
        </thead>
        <tbody id="historicoBody"></tbody>
      </table>
    </div>

    <!-- GRÁFICO -->
    <div class="card p-4 mb-4">
      <h5>📊 Evolução do Peso</h5>
      <canvas id="grafico"></canvas>
    </div>
  </div>
</div>

<script>
  // Banco de dados em JSON
  let db = { usuarios: [] };
  let usuarioAtual = null;

  // CADASTRO
  document.getElementById("cadastroForm").addEventListener("submit", e => {
    e.preventDefault();
    const novoUsuario = document.getElementById("novoUsuario").value;
    const novaSenha = document.getElementById("novaSenha").value;

    if(db.usuarios.find(u => u.usuario === novoUsuario)){
      alert("Usuário já existe!");
    } else {
      db.usuarios.push({ usuario: novoUsuario, senha: novaSenha, dados: { idade: null, altura: null }, historico_pesos: [], diagnosticos: [] });
      alert("Cadastro realizado com sucesso!");
    }
  });

  // LOGIN
  document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();
    const user = document.getElementById("usuario").value;
    const pass = document.getElementById("senha").value;

    const encontrado = db.usuarios.find(u => u.usuario === user && u.senha === pass);
    if(encontrado){
      usuarioAtual = encontrado;
      document.getElementById("userName").textContent = usuarioAtual.usuario;
      document.getElementById("loginCard").classList.add("d-none");
      document.getElementById("cadastroCard").classList.add("d-none");
      document.getElementById("dashboard").classList.remove("d-none");
    } else {
      alert("Usuário ou senha inválidos!");
    }
  });

  // GRÁFICO
  const ctx = document.getElementById('grafico').getContext('2d');
  const grafico = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Peso (kg)', data: [], borderColor: 'green', fill: true }] }
  });

  // CALCULAR IMC
  document.getElementById("dadosForm").addEventListener("submit", e => {
    e.preventDefault();
    const idade = parseInt(document.getElementById("idade").value);
    const peso = parseFloat(document.getElementById("peso").value);
    const altura = parseFloat(document.getElementById("altura").value);

    usuarioAtual.dados.idade = idade;
    usuarioAtual.dados.altura = altura;
    usuarioAtual.historico_pesos.push(peso);

    grafico.data.labels.push(usuarioAtual.historico_pesos.length);
    grafico.data.datasets[0].data.push(peso);
    grafico.update();

    const imc = peso / (altura ** 2);
    const pesoMin = 18.5 * (altura ** 2);
    const pesoMax = 24.9 * (altura ** 2);
    const pesoIdeal = ((pesoMin + pesoMax) / 2).toFixed(1);

    let status, biotipo;
    if(imc < 18.5){ status="Abaixo do peso"; biotipo="Ectomorfo"; }
    else if(imc < 24.9){ status="Peso ideal"; biotipo="Mesomorfo"; }
    else { status="Acima do peso"; biotipo="Endomorfo"; }

    document.getElementById("resultado").classList.remove("d-none");
    document.getElementById("resultado").innerHTML = `
      <h4>Status: ${status}</h4>
      <p>IMC: ${imc.toFixed(1)}</p>
      <p>Peso ideal: ${pesoIdeal} kg</p>
      <p>Biotipo: ${biotipo}</p>
    `;

    document.getElementById("modalidadeCard").classList.remove("d-none");
  });

  // DIAGNÓSTICO
  document.getElementById("diagnosticoBtn").addEventListener("click", () => {
    const modalidade = document.getElementById("modalidade").value;
    let treino, dieta;

    switch(modalidade){
      case "corredor": treino="Corridas intervaladas"; dieta="Carboidratos complexos"; break;
      case "futebol": treino="Agilidade e força"; dieta="Proteínas magras e hidratação"; break;
      case "lutador": treino="Explosão e resistência"; dieta="Alta proteína"; break;
      case "fisiculturista": treino="Hipertrofia intensa"; dieta="Proteínas + carboidratos controlados"; break;
      case "bombeiro": treino="Funcional intenso"; dieta="Equilibrada para energia"; break;
      case "policial": treino="Força e agilidade"; dieta="Proteínas magras e
